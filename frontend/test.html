<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PDF Birleştirme Test</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        #sonuc { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>🔗 PDF Birleştirme Test</h2>
    
    <input type="file" id="dosyalar" multiple accept=".pdf"><br><br>
    <button onclick="birlestir()">Birleştir</button>
    
    <div id="sonuc"></div>

    <script>
        async function birlestir() {
            const dosyalar = document.getElementById('dosyalar').files;
            
            if (dosyalar.length < 2) {
                document.getElementById('sonuc').innerHTML = '❌ En az 2 PDF seç!';
                return;
            }

            const formData = new FormData();
            for (let dosya of dosyalar) {
                formData.append('files', dosya);
            }

            document.getElementById('sonuc').innerHTML = '⏳ Birleştiriliyor...';

            try {
                const response = await fetch('http://127.0.0.1:8000/merge', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'birlesik_dosya.pdf';
                    a.click();
                    document.getElementById('sonuc').innerHTML = '✅ Başarılı! İndirme başladı.';
                } else {
                    const hata = await response.json();
                    document.getElementById('sonuc').innerHTML = '❌ Hata: ' + hata.detail;
                }
            } catch (e) {
                document.getElementById('sonuc').innerHTML = '❌ Bağlantı hatası: ' + e.message;
            }
        }
    </script>

    <hr>
    <h2>🖼️ Resim → PDF Dönüştürme</h2>
    <input type="file" id="resimler" multiple accept=".jpg,.jpeg,.png,.webp"><br><br>
    <button onclick="donustur()">Dönüştür</button>
    <div id="donusturSonuc"></div>

    <script>
        async function donustur() {
            const dosyalar = document.getElementById('resimler').files;

            if (dosyalar.length < 1) {
                document.getElementById('donusturSonuc').innerHTML = '❌ En az 1 resim seç!';
                return;
            }

            const formData = new FormData();
            for (let dosya of dosyalar) {
                formData.append('files', dosya);
            }

            document.getElementById('donusturSonuc').innerHTML = '⏳ Dönüştürülüyor...';

            try {
                const response = await fetch('http://127.0.0.1:8000/convert', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'donusturulmus.pdf';
                    a.click();
                    document.getElementById('donusturSonuc').innerHTML = '✅ Başarılı! İndirme başladı.';
                } else {
                    const hata = await response.json();
                    document.getElementById('donusturSonuc').innerHTML = '❌ Hata: ' + hata.detail;
                }
            } catch (e) {
                document.getElementById('donusturSonuc').innerHTML = '❌ Bağlantı hatası: ' + e.message;
            }
        }
    </script>
    <hr>
    <h2>💧 Filigran Ekleme</h2>
    <input type="file" id="filigranDosya" accept=".pdf"><br><br>
    <input type="text" id="filigranMetin" placeholder="Filigran metni (örn: GİZLİ)" style="padding:8px; width:300px;"><br><br>
    <button onclick="filigranEkle()">Filigran Ekle</button>
    <div id="filigranSonuc"></div>

    <script>
        async function filigranEkle() {
            const dosya = document.getElementById('filigranDosya').files[0];
            const metin = document.getElementById('filigranMetin').value;

            if (!dosya) {
                document.getElementById('filigranSonuc').innerHTML = '❌ PDF seç!';
                return;
            }
            if (!metin) {
                document.getElementById('filigranSonuc').innerHTML = '❌ Filigran metni gir!';
                return;
            }

            const formData = new FormData();
            formData.append('file', dosya);
            formData.append('text', metin);

            document.getElementById('filigranSonuc').innerHTML = '⏳ Filigran ekleniyor...';

            try {
                const response = await fetch('http://127.0.0.1:8000/watermark', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'filigranli_dosya.pdf';
                    a.click();
                    document.getElementById('filigranSonuc').innerHTML = '✅ Başarılı! İndirme başladı.';
                } else {
                    const hata = await response.json();
                    document.getElementById('filigranSonuc').innerHTML = '❌ Hata: ' + hata.detail;
                }
            } catch (e) {
                document.getElementById('filigranSonuc').innerHTML = '❌ Bağlantı hatası: ' + e.message;
            }
        }
    </script>

    <hr>
    <h2>📄 Word / PowerPoint → PDF</h2>
    <input type="file" id="officeDosya" accept=".docx,.pptx,.doc,.ppt" style="margin-bottom:10px;">
    <br><br>
    <button onclick="officeDonustur()">PDF'e Dönüştür</button>
    <div id="officeSonuc" style="margin-top:10px;"></div>

    <script>
        async function officeDonustur() {
            const input = document.getElementById('officeDosya');
            
            if (!input || input.files.length === 0) {
                document.getElementById('officeSonuc').innerHTML = '❌ Lütfen bir dosya seçin!';
                return;
            }

            const dosya = input.files[0];
            const formData = new FormData();
            formData.append('file', dosya);

            document.getElementById('officeSonuc').innerHTML = '⏳ Dönüştürülüyor: ' + dosya.name;

            try {
                const response = await fetch('http://127.0.0.1:8000/convert-office', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'donusturulmus.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    document.getElementById('officeSonuc').innerHTML = '✅ Başarılı! İndirme başladı.';
                } else {
                    const hata = await response.json();
                    document.getElementById('officeSonuc').innerHTML = '❌ Hata: ' + hata.detail;
                }
            } catch (e) {
                document.getElementById('officeSonuc').innerHTML = '❌ Bağlantı hatası: ' + e.message;
            }
        }
    </script>
</body>
</html>
