<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; }
        
        .header {
            background: #481a1f;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        
        /* İstatistik Kartları */
        .kartlar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .kart {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .kart .sayi { font-size: 36px; font-weight: bold; color: #dc3545; }
        .kart .etiket { color: #666; margin-top: 5px; font-size: 13px; }

        /* Tablo */
        .tablo-baslik {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #dc3545; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9fa; }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-merge { background: #cce5ff; color: #004085; }
        .badge-convert { background: #d4edda; color: #155724; }
        .badge-watermark { background: #fff3cd; color: #856404; }

        /* Kullanıcı Tablosu */
        .sil-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .sil-btn:hover { background: #c82333; }
    </style>
</head>
<body>

<div class="header">
    <h1>🛡️Admin Paneli</h1>
    <span>PDF Projesi</span>
</div>

<div class="container">

    <!-- İstatistik Kartları -->
    <div class="kartlar">
        <div class="kart">
            <div class="sayi" id="toplamIslem">-</div>
            <div class="etiket">Toplam İşlem</div>
        </div>
        <div class="kart">
            <div class="sayi" id="birlestirme">-</div>
            <div class="etiket">Birleştirme</div>
        </div>
        <div class="kart">
            <div class="sayi" id="donusturme">-</div>
            <div class="etiket">Dönüştürme</div>
        </div>
        <div class="kart">
            <div class="sayi" id="filigran">-</div>
            <div class="etiket">Filigran</div>
        </div>
        <div class="kart">
            <div class="sayi" id="toplamKullanici">-</div>
            <div class="etiket">Kullanıcı</div>
        </div>
    </div>

    <!-- İşlem Geçmişi -->
    <div class="tablo-baslik">
        <h2 style="margin-bottom:15px;">📋 İşlem Geçmişi</h2>
        <table id="islemTablo">
            <thead>
                <tr>
                    <th>#</th>
                    <th>İşlem Türü</th>
                    <th>IP Adresi</th>
                    <th>Dosya Adı</th>
                    <th>Durum</th>
                    <th>Tarih</th>
                </tr>
            </thead>
            <tbody id="islemBody">
                <tr><td colspan="6" style="text-align:center">Yükleniyor...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Kullanıcı Listesi -->
    <div class="tablo-baslik">
        <h2 style="margin-bottom:15px;">👥 Kullanıcılar</h2>
        <table id="kullaniciTablo">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Kullanıcı Adı</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>İşlem</th>
                </tr>
            </thead>
            <tbody id="kullaniciBody">
                <tr><td colspan="5" style="text-align:center">Yükleniyor...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    const API = "https://pdf-backend-4kna.onrender.com";

    // İstatistikleri yükle
    async function istatistikYukle() {
        const res = await fetch(`${API}/admin/istatistik`);
        const data = await res.json();
        
        document.getElementById('toplamIslem').textContent = data.toplam_islem;
        document.getElementById('birlestirme').textContent = data.birlestirme;
        document.getElementById('donusturme').textContent = data.donusturme;
        document.getElementById('filigran').textContent = data.filigran;
        document.getElementById('toplamKullanici').textContent = data.toplam_kullanici;
    }

    // İşlemleri yükle
    async function islemleriYukle() {
        const res = await fetch(`${API}/admin/islemler`);
        const data = await res.json();
        
        const tbody = document.getElementById('islemBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Henüz işlem yok</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(islem => `
            <tr>
                <td>${islem.id}</td>
                <td>
                    <span class="badge badge-${islem.islem_turu}">
                        ${islem.islem_turu === 'merge' ? '🔗 Birleştirme' : 
                          islem.islem_turu === 'convert' ? '🖼️ Dönüştürme' : '💧 Filigran'}
                    </span>
                </td>
                <td>${islem.ip_adresi || '-'}</td>
                <td style="font-size:12px">${islem.dosya_adi || '-'}</td>
                <td>${islem.durum}</td>
                <td>${islem.tarih || '-'}</td>
            </tr>
        `).join('');
    }

    // Kullanıcıları yükle
    async function kullanicilariYukle() {
        const res = await fetch(`${API}/admin/users`);
        const data = await res.json();
        
        const tbody = document.getElementById('kullaniciBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Henüz kullanıcı yok</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(kullanici => `
            <tr>
                <td>${kullanici.id}</td>
                <td>${kullanici.username}</td>
                <td>${kullanici.email}</td>
                <td>${kullanici.role === 'admin' ? '🛡️ Admin' : '👤 Üye'}</td>
                <td>
                    <button class="sil-btn" onclick="kullaniciSil(${kullanici.id}, '${kullanici.username}')">
                        Sil
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Kullanıcı sil
    async function kullaniciSil(id, isim) {
        if (!confirm(`${isim} silinsin mi?`)) return;
        
        const res = await fetch(`${API}/admin/kullanici/${id}`, {
            method: 'DELETE'
        });
        
        if (res.ok) {
            alert('Kullanıcı silindi!');
            kullanicilariYukle();
            istatistikYukle();
        }
    }

    // Sayfa açılınca hepsini yükle
    istatistikYukle();
    islemleriYukle();
    kullanicilariYukle();

    // Her 30 saniyede otomatik yenile
    setInterval(() => {
        istatistikYukle();
        islemleriYukle();
    }, 30000);
</script>
</body>
</html>
